# Render blueprint — https://render.com/docs/blueprint-spec
#
# Drop this file in the repo root, push to GitHub, then on Render:
#   New → Blueprint → connect this repo → review → Apply.
# Render provisions the web service AND the managed PostgreSQL database in one
# shot, and wires DATABASE_URL into the web service automatically.

databases:
  - name: cia-db
    plan: free                    # free Postgres (expires after 90 days; upgrade to keep)
    region: singapore
    databaseName: cia
    user: cia

services:
  - type: web
    name: cloud-architect
    runtime: node
    plan: free                    # upgrade to "starter" ($7/mo) for no idle spin-down
    region: singapore             # closest to your KL/SG demo audience

    buildCommand: npm install && npm run client:build
    startCommand: npm start

    healthCheckPath: /api/catalog
    autoDeploy: true              # redeploy on every push to the chosen branch

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: CHUTES_MODEL
        value: zai-org/GLM-5.1-TEE

      # State now lives in PostgreSQL, so it persists across redeploys on every
      # plan tier. Render injects this from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: cia-db
          property: connectionString

      # Session cookie signing secret — generated by Render, never committed.
      - key: SESSION_SECRET
        generateValue: true

      # Secrets set manually in the Render dashboard (sync: false keeps them
      # out of source control). Set these after the first deploy:
      - key: Chutes_api_key
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
